<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR.js NFT - Solución Definitiva Artefactos</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body style="margin: 0; overflow: hidden; touch-action: none;">

    <div class="arjs-loader" style="position: fixed; z-index: 999; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
        <div>Cargando descriptores de imagen...</div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        gesture-detector
        shadow="type: pcfsoft"
        renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; exposure: 2.2; sortObjects: true; logarithmicDepthBuffer: true;">

        <a-assets>
            <a-asset-item id="coheteModel" src="cuboesfera.glb"></a-asset-item>
        </a-assets>

        <a-nft
            type="nft"
            url="./marcador/marcador"
            smooth="true"
            smoothCount="10"
            smoothTolerance=".01"
            smoothThreshold="5"
            raycaster="objects: .clickable"
            emitevents="true"
            cursor="fuse: false; rayOrigin: mouse;">

            <a-entity
                id="cohete"
                gltf-model="#coheteModel"
                scale="50 50 50" 
                position="50 5 -100" 
                class="clickable"
                gesture-handler
                shadow="cast: true; receive: false"
                animation-mixer>
            </a-entity>

            <a-plane 
                rotation="-90 0 0" 
                width="600" 
                height="600" 
                shadow="receive: true" 
                material="shader: shadow; opacity: 0.5;"> 
            </a-plane>

        </a-nft>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 1.8;" position="1 10 5"></a-entity>

        <a-entity camera="near: 1; far: 10000;"></a-entity>
    </a-scene>

    <script>
        window.addEventListener('arjs-nft-loaded', () => {
           document.querySelector('.arjs-loader').style.display = 'none';
        });
    </script>
</body>
</html>
